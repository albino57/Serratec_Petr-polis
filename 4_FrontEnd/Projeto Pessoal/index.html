<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style_index.css">
    <title>CripChat</title>
</head>

<body>
    <form>
        <img class="image" src="./assets/logo.jpg" alt="Logo do site">
        
        <h1>CrypChat</h1>

        <div class="divEmail">
            <label for="email" class="sr-only">email</label>
            <input type="email" placeholder="✉️ E-mail" id="email" required>
        </div>

        <div class="divPassword">
            <label for="password" class="sr-only">password</label>
            <input type="password" placeholder="🔑 Password" id="password" required>
        </div>

        <div class="btn">
            <button class="btnPassword" type="submit">Reset Password</button>
            <button class="btnConnect"  type="submit">Connect</button>
        </div>
    </form>
</body>

</html>
